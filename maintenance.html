<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>Intranet en maintenance</title>
		<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
		<style>:root
		{
			--yellow: #F5C300;
			--black: #1A1A1A;
			--dark: #111111;
			--white: #FFFFFF;
			--gray: #2E2E2E;
			--stripe: rgba(245, 195, 0, 0.06);
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background-color: var(--dark);
			color: var(--white);
			font-family: 'Barlow', sans-serif;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			position: relative;
		}

		/* ── Diagonal stripe background ── */
		body::before {
			content: '';
			position: fixed;
			inset: -50%;
			background: repeating-linear-gradient(-55deg, var(--stripe) 0px, var(--stripe) 2px, transparent 2px, transparent 48px);
			animation: drift 40s linear infinite;
			pointer-events: none;
			z-index: 0;
		}
		@keyframes drift {
			to {
				transform: translateX(96px);
			}
		}

		/* ── Yellow top border ── */
		body::after {
			content: '';
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			height: 6px;
			background: var(--yellow);
			z-index: 10;
		}

		/* ── Container ── */
		.container {
			position: relative;
			z-index: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 2.5rem;
			padding: 2rem;
			max-width: 760px;
			width: 100%;
			text-align: center;
		}

		/* ── Logo ── */
		.logo-wrap {
			display: inline-flex;
			padding: 1px;
			gap: 14px;
			align-items: center;
			box-shadow: 0 8px 40px rgba(245, 195, 0, 0.25);
			animation: fadeDown 0.7s ease both;
		}
		.logo-text {
			font-family: 'Barlow Condensed', sans-serif;
			font-weight: 700;
			font-size: 1.05rem;
			line-height: 1.2;
			color: var(--black);
			text-align: left;
			letter-spacing: 0.02em;
		}
		.logo-cat {
			font-family: 'Barlow Condensed', sans-serif;
			font-weight: 900;
			font-size: 2rem;
			color: var(--black);
			letter-spacing: -0.02em;
			border-left: 2px solid var(--black);
			padding-left: 14px;
		}

		/* ── Icon zone ── */
		.icon-zone {
			position: relative;
			width: 110px;
			height: 110px;
			animation: fadeUp 0.7s 0.2s ease both;
		}
		.icon-ring {
			position: absolute;
			inset: 0;
			border-radius: 50%;
			border: 2px solid var(--yellow);
			opacity: 0.35;
			animation: pulse-ring 2.4s ease-out infinite;
		}
		.icon-ring:nth-child(2) {
			animation-delay: 0.8s;
			opacity: 0.2;
		}
		@keyframes pulse-ring {
			0% {
				transform: scale(1);
				opacity: 0.35;
			}
			100% {
				transform: scale(1.9);
				opacity: 0;
			}
		}
		.icon-core {
			position: absolute;
			inset: 12px;
			background: var(--gray);
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			border: 2px solid rgba(245, 195, 0, 0.3);
		}
		.icon-core svg {
			width: 44px;
			height: 44px;
			fill: var(--yellow);
			animation: spin-slow 8s linear infinite;
		}
		@keyframes spin-slow {
			to {
				transform: rotate(360deg);
			}
		}

		/* ── Heading ── */
		.heading {
			animation: fadeUp 0.7s 0.35s ease both;
		}
		.heading h1 {
			font-family: 'Barlow Condensed', sans-serif;
			font-weight: 900;
			font-size: clamp(2.4rem, 7vw, 4rem);
			line-height: 1;
			letter-spacing: -0.01em;
			text-transform: uppercase;
		}
		.heading h1 span {
			color: var(--yellow);
		}
		.heading p {
			margin-top: 0.9rem;
			font-size: 1.05rem;
			color: rgba(255, 255, 255, 0.55);
			font-weight: 400;
			line-height: 1.6;
			max-width: 520px;
		}

		/* ── Status bar ── */
		.status-bar {
			width: 100%;
			max-width: 480px;
			animation: fadeUp 0.7s 0.5s ease both;
		}
		.status-label {
			display: flex;
			justify-content: space-between;
			font-family: 'Barlow Condensed', sans-serif;
			font-size: 0.82rem;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.4);
			margin-bottom: 10px;
		}
		.status-label .pct {
			color: var(--yellow);
		}
		.bar-track {
			width: 100%;
			height: 5px;
			background: var(--gray);
			border-radius: 99px;
			overflow: hidden;
		}
		.bar-fill {
			height: 100%;
			width: 0;
			background: var(--yellow);
			border-radius: 99px;
		}
		@keyframes fill-bar {
			to {
				width: 67%;
			}
		}

		/* ── Info cards ── */
		.cards {
			display: flex;
			gap: 1rem;
			width: 100%;
			max-width: 480px;
			animation: fadeUp 0.7s 0.65s ease both;
		}
		.card {
			flex: 1;
			background: var(--gray);
			border: 1px solid rgba(245, 195, 0, 0.1);
			padding: 1rem 1.2rem;
			border-radius: 4px;
			text-align: left;
		}
		.card-label {
			font-family: 'Barlow Condensed', sans-serif;
			font-size: 0.72rem;
			letter-spacing: 0.13em;
			text-transform: uppercase;
			color: var(--yellow);
			margin-bottom: 4px;
		}
		.card-value {
			font-family: 'Barlow Condensed', sans-serif;
			font-weight: 600;
			font-size: 1rem;
			color: rgba(255, 255, 255, 0.85);
		}

		/* ── Contact ── */
		.contact {
			font-size: 0.88rem;
			color: rgba(255, 255, 255, 0.35);
			animation: fadeUp 0.7s 0.8s ease both;
		}
		.contact a {
			color: var(--yellow);
			text-decoration: none;
			font-weight: 600;
		}
		.contact a:hover {
			text-decoration: underline;
		}

		/* ── Animations ── */
		@keyframes fadeDown {
			from {
				opacity: 0;
				transform: translateY(-20px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(20px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		/* ── Bottom yellow bar ── */
		.bottom-bar {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			height: 4px;
			background: linear-gradient(90deg, var(--yellow) 67%, var(--gray) 67%);
			z-index: 10;
		}

		@media(max-width: 500px) {
			.cards {
				flex-direction: column;
			}
			.logo-cat {
				font-size: 1.6rem;
			}
		}
	</style>
</head>
<body>

	<div
		class="container">

		<!-- Logo -->
		<div class="logo-wrap">
			<img src="/Hffintranet/Views/assets/logoHFF.jpg" alt="logo">
		</div>

		<!-- Gear icon -->
		<div class="icon-zone">
			<div class="icon-ring"></div>
			<div class="icon-ring"></div>
			<div
				class="icon-core">
				<!-- Gear SVG -->
				<svg viewbox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
					<path d="M54.2 36.4l-3.6-.7a19.2 19.2 0 0 0-1.3-3.1l2.1-3a2 2 0 0 0-.2-2.5l-3.3-3.3a2 2 0 0 0-2.5-.2l-3 2.1a19.2 19.2 0 0 0-3.1-1.3l-.7-3.6A2 2 0 0 0 36.7 19h-4.7a2 2 0 0 0-2 1.7l-.7 3.6a19.2 19.2 0 0 0-3.1 1.3l-3-2.1a2 2 0 0 0-2.5.2l-3.3 3.3a2 2 0 0 0-.2 2.5l2.1 3a19.2 19.2 0 0 0-1.3 3.1l-3.6.7A2 2 0 0 0 13 38.3V43a2 2 0 0 0 1.7 2l3.6.7a19.2 19.2 0 0 0 1.3 3.1l-2.1 3a2 2 0 0 0 .2 2.5l3.3 3.3a2 2 0 0 0 2.5.2l3-2.1a19.2 19.2 0 0 0 3.1 1.3l.7 3.6A2 2 0 0 0 32.3 62H37a2 2 0 0 0 2-1.7l.7-3.6a19.2 19.2 0 0 0 3.1-1.3l3 2.1a2 2 0 0 0 2.5-.2l3.3-3.3a2 2 0 0 0 .2-2.5l-2.1-3a19.2 19.2 0 0 0 1.3-3.1l3.6-.7A2 2 0 0 0 56 43v-4.7a2 2 0 0 0-1.8-1.9zM34.7 46.4a6.8 6.8 0 1 1 0-13.6 6.8 6.8 0 0 1 0 13.6z"/>
					<circle cx="34.7" cy="39.6" r="4"/>
				</svg>
			</div>
		</div>

		<!-- Heading -->
		<div class="heading">
			<h1>Intranet en
				<span>maintenance</span>
			</h1>
			<p>Nous effectuons des travaux de construction et d'amélioration de l'intranet. Nous serons de retour très prochainement. Merci de votre compréhension.</p>
		</div>

		<!-- Progress -->
		<div class="status-bar">
			<div class="status-label">
				<span>Avancement des travaux</span>
				<span class="pct">67 %</span>
			</div>
			<div class="bar-track">
				<div class="bar-fill"></div>
			</div>
		</div>

		<!-- Cards -->
		<div class="cards">
			<div class="card">
				<div class="card-label">Statut</div>
				<div class="card-value">En construction</div>
			</div>
			<div class="card">
				<div class="card-label">Retour estimé</div>
				<div class="card-value">Prochainement</div>
			</div>
			<div class="card">
				<div class="card-label">Équipe</div>
				<div class="card-value">HFF Informatique</div>
			</div>
		</div>

	</div>

	<div class="bottom-bar"></div>
<script>
(function () {
const startHour = 12;
const endHour = 17;
function updateProgress() {
const now = new Date();
const current = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
let percent;
if (current <= startHour) {
percent = 0;
} else if (current >= endHour) {
percent = 100;
} else {
percent = ((current - startHour) / (endHour - startHour)) * 100;
}
percent = Math.round(percent);
// Texte
document.querySelector('.pct').textContent = percent + ' %';
// Barre principale
document.querySelector('.bar-fill').style.width = percent + '%';
// Barre du bas
document.querySelector('.bottom-bar').style.background =
`linear-gradient(90deg, var(--yellow) ${percent}%, var(--gray) ${percent}%)`;
}
// Mise à jour immédiate
updateProgress();
// Mise à jour toutes les secondes
setInterval(updateProgress, 1000);
})();
</script>
</body>
</html>
