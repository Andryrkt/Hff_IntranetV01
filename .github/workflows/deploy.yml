name: Deploy PHP Application HffIntranet PreProd

on:
  push:
    branches: [ feature/profilUser ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy files
        shell: powershell
        run: |
          robocopy .\ "C:\wamp64\www\Hffintranet_new_profil" /E /XD .git .github var /XF .env
          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit 1 }

      - name: Composer Install
        shell: powershell
        run: |
          Set-Location "C:\wamp64\www\Hffintranet_new_profil"
          if (-Not (Test-Path "var/cache/proxies")) { New-Item -ItemType Directory -Path "var/cache/proxies" -Force }
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Clear Cache
        shell: powershell
        run: |
          if (Test-Path "C:\wamp64\www\Hffintranet_new_profil\var\cache") {
            Remove-Item -Path "C:\wamp64\www\Hffintranet_new_profil\var\cache\*" -Recurse -Force
          }

      - name: Send Discord Notification
        if: always()
        shell: powershell
        run: |
          $webhookUrl = "${{ secrets.DISCORD_WEBHOOK }}"
          if ($webhookUrl) {
            $status = "${{ job.status }}"
            $color = if ($status -eq "success") { 3066993 } else { 15158332 }
            $title = if ($status -eq "success") { "🚀 Déploiement Réussi" } else { "❌ Échec du Déploiement" }
            $desc = if ($status -eq "success") { "Le déploiement sur **HffIntranet PreProd** est terminé avec succès." } else { "Une erreur est survenue lors du déploiement sur **HffIntranet PreProd**." }

            $embed = @{
              title = $title
              description = $desc
              color = $color
              fields = @(
                @{ name = "Branche"; value = "`${{ github.ref_name }}`"; inline = $true }
                @{ name = "Auteur"; value = "`${{ github.actor }}`"; inline = $true }
                @{ name = "Logs"; value = "[Voir le détail du job](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"; inline = $false }
              )
              footer = @{ text = "HffIntranet CI/CD" }
              timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            }

            $payload = @{ embeds = @($embed) } | ConvertTo-Json -Depth 5 -Compress
            Invoke-RestMethod -Uri $webhookUrl -Method Post -Body ([System.Text.Encoding]::UTF8.GetBytes($payload)) -ContentType 'application/json'
          } else {
            Write-Host "Aucun webhook Discord configuré."
          }