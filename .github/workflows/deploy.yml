name: Deploy PHP Application HffIntranet PreProd

on:
  push:
    branches: [ feature/profilUser ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy files
        shell: powershell
        run: |
          robocopy .\ "C:\wamp64\www\Hffintranet_new_profil" /E /XD .git .github var /XF .env
          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit 1 }

      - name: Composer Install
        shell: powershell
        run: |
          Set-Location "C:\wamp64\www\Hffintranet_new_profil"
          if (-Not (Test-Path "var/cache/proxies")) { New-Item -ItemType Directory -Path "var/cache/proxies" -Force }
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Clear Cache
        shell: powershell
        run: |
          if (Test-Path "C:\wamp64\www\Hffintranet_new_profil\var\cache") {
            Remove-Item -Path "C:\wamp64\www\Hffintranet_new_profil\var\cache\*" -Recurse -Force
          }

      - name: Send Discord Notification
        if: always()
        shell: bash
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          
          if [ "${{ job.status }}" == "success" ]; then
            COLOR=3066993
            TITLE="🚀 Déploiement Réussi"
            DESC="Le déploiement sur **HffIntranet PreProd** est terminé avec succès."
          else
            COLOR=15158332
            TITLE="❌ Échec du Déploiement"
            DESC="Une erreur est survenue lors du déploiement sur **HffIntranet PreProd**."
          fi
          
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "$TITLE",
              "description": "$DESC",
              "color": $COLOR,
              "fields": [
                { "name": "Branche", "value": "**${{ github.ref_name }}**", "inline": true },
                { "name": "Auteur", "value": "**${{ github.actor }}**", "inline": true },
                { "name": "Logs", "value": "[Voir le détail du job](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
              ],
              "footer": { "text": "HffIntranet CI/CD" }
            }]
          }
          EOF
          )
          
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL" > /dev/null