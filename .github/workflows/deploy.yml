name: Deploy PHP Application HffIntranet PreProd

on:
  push:
    branches: [ feature/profilUser ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Deploy files
        shell: powershell
        run: |
          robocopy .\ "C:\wamp64\www\Hffintranet_new_profil" /E /XD .git .github var /XF .env
          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit 1 }

      - name: Composer Install
        shell: powershell
        run: |
          Set-Location "C:\wamp64\www\Hffintranet_new_profil"
          if (-Not (Test-Path "var/cache/proxies")) { New-Item -ItemType Directory -Path "var/cache/proxies" -Force }
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Clear Cache
        shell: powershell
        run: |
          if (Test-Path "C:\wamp64\www\Hffintranet_new_profil\var\cache") {
            Remove-Item -Path "C:\wamp64\www\Hffintranet_new_profil\var\cache\*" -Recurse -Force
          }

      - name: Send Discord Notification
        if: always()
        shell: powershell
        run: |
          $webhookUrl = "${{ secrets.DISCORD_WEBHOOK }}"
          if ($webhookUrl) {
            $status = "${{ job.status }}"
            if ($status -eq "success") {
              $msg = "✅ **Déploiement réussi** sur HffIntranet PreProd (Branche: `${{ github.ref_name }}`) par `${{ github.actor }}` ! :rocket:"
            } else {
              $msg = "❌ **ÉCHEC du déploiement** sur HffIntranet PreProd (Branche: `${{ github.ref_name }}`) ! ⚠️"
            }
            $payload = @{ content = $msg } | ConvertTo-Json -Compress
            Invoke-RestMethod -Uri $webhookUrl -Method Post -Body ([System.Text.Encoding]::UTF8.GetBytes($payload)) -ContentType 'application/json'
          } else {
            Write-Host "Aucun webhook Discord configuré."
          }