services:
  # Modèles DDP
  App\Model\ddp\DdpModel:
    public: true

  # Factories DDP
  App\Factory\ddp\DdpFactory:
    arguments:
      - '@App\Model\ddp\DdpModel'
      - '@doctrine.orm.default_entity_manager'
    public: true

  # Contrôleurs DDP
  App\Controller\ddp\DdpController:
    arguments:
      $ddpFactory: '@App\Factory\ddp\DdpFactory'
    public: true
